<svg
  class="logo-mark"
  viewBox="0 0 52 52"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer thick circle (citrus rind) -->
  <circle cx="26" cy="26" r="23" stroke="#c9a84c" stroke-width="1" fill="none" />
  <!-- Inner thin circle -->
  <circle cx="26" cy="26" r="18" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity="0.7" />

  <!-- Center dot -->
  <circle cx="26" cy="26" r="1.8" fill="#c9a84c" />

  <!-- Main cardinal rays (thick, reaching inner circle) -->
  <line x1="26" y1="8" x2="26" y2="24.2" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="26" y1="27.8" x2="26" y2="44" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="8" y1="26" x2="24.2" y2="26" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="27.8" y1="26" x2="44" y2="26" stroke="#c9a84c" stroke-width="1.2" />

  <!-- Diagonal rays -->
  <line x1="11.7" y1="11.7" x2="22.7" y2="22.7" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="29.3" y1="29.3" x2="40.3" y2="40.3" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="40.3" y1="11.7" x2="29.3" y2="22.7" stroke="#c9a84c" stroke-width="1.2" />
  <line x1="22.7" y1="29.3" x2="11.7" y2="40.3" stroke="#c9a84c" stroke-width="1.2" />

  <!-- Segment inner detail lines (short diagonal marks inside each segment) -->
  <!-- Top segment -->
  <line x1="22" y1="13" x2="20.5" y2="15.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <line x1="30" y1="13" x2="31.5" y2="15.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <!-- Bottom segment -->
  <line x1="22" y1="39" x2="20.5" y2="36.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <line x1="30" y1="39" x2="31.5" y2="36.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <!-- Left segment -->
  <line x1="13" y1="22" x2="15.5" y2="20.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <line x1="13" y1="30" x2="15.5" y2="31.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <!-- Right segment -->
  <line x1="39" y1="22" x2="36.5" y2="20.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <line x1="39" y1="30" x2="36.5" y2="31.5" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />

</svg>
