<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radiance Web Studio — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --cream: #f5ede0;
      --dark: #080706;
      --dark2: #0f0e0c;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas background ── */
    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 1;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── Main layout ── */
    .scene {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── Radiance glow ring ── */
    .glow-ring {
      position: absolute;
      width: min(600px, 90vw);
      height: min(600px, 90vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 65%);
      animation: pulse 20s ease-in-out infinite;
      pointer-events: none;
      border: 1px solid rgba(201,168,76,0.12);
      box-shadow: 0 0 190px rgba(201,168,76,0.6), inset 0 0 60px rgba(201,168,76,0.6); 
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.08); opacity: 1; }
    }

    /* ── Logo mark ── */
    .logo-mark {
      width: 52px;
      height: 52px;
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    /* ── Studio label ── */
    .studio-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.55s;
    }

    /* ── Main title ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 9vw, 7.5rem);
      line-height: 0.92;
      text-align: center;
      letter-spacing: -0.01em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.1s ease forwards 0.75s;
    }
    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* ── Divider ── */
    .divider {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 2.2rem auto;
      opacity: 0;
      animation: growLine 1.2s ease forwards 1.3s;
    }
    @keyframes growLine {
      to { height: 60px; opacity: 0.7; }
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,237,224,0.45);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.6s;
    }

    /* ── Gold accent line ── */
    .accent-line {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1.2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 2s;
    }
    .accent-line span {
      display: block;
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.7;
    }
    .accent-line p {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(245,237,224,0.75);
      white-space: nowrap;
    }
    
    /* ── Logo rotation ── */
    img {
      animation: rotate 40s linear infinite;
    }
    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    /* ── Shared fade-up ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      h1 {
        font-size: clamp(2.6rem, 15vw, 3.8rem);
        line-height: 1.0;
      }

      .studio-label {
        font-size: 0.6rem;
        letter-spacing: 0.3em;
      }

      img {
        width: 42px !important;
        height: 42px !important;
        margin-bottom: 1.6rem;
      }

      .glow-ring {
        width: min(340px, 92vw);
        height: min(340px, 92vw);
        box-shadow: 0 0 80px rgba(201,168,76,0.45), inset 0 0 30px rgba(201,168,76,0.35);
      }

      .divider {
        margin: 1.6rem auto;
      }

      .tagline {
        font-size: 0.7rem;
        letter-spacing: 0.15em;
      }

      .accent-line {
        bottom: 1.8rem;
        gap: 0.8rem;
        padding: 0 1rem;
      }

      .accent-line span {
        width: 24px;
      }

      .accent-line p {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
      }

      .cursor-glow {
        display: none;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: clamp(2.2rem, 16vw, 3rem);
      }

      .accent-line p {
        font-size: 0.55rem;
        letter-spacing: 0.14em;
      }
    }

    /* ── Landscape mobile ── */
    @media (max-height: 500px) and (orientation: landscape) {
      .scene {
        padding: 1rem 2rem 3.5rem;
      }

      img {
        width: 32px !important;
        height: 32px !important;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: clamp(1.8rem, 7vw, 3rem);
        line-height: 1;
      }

      .divider {
        margin: 1rem auto;
      }

      .glow-ring {
        width: min(280px, 55vw);
        height: min(280px, 55vw);
      }

      .accent-line {
        bottom: 1rem;
      }
    }

    /* ── Cursor glow ── */
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
      z-index: 3;
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="scene">
    <div class="glow-ring">*</div>

    <!-- SVG logo mark: stylised R / sun rays -->
    <img src="ragiance_logo1.svg" width="60" />

    <p class="studio-label">Radiance Web Studio</p>

    <h1>Something<br/><em>radiant</em><br/>is coming your way.</h1>

    <div class="divider"></div>

    <p class="tagline">Work in progress &nbsp;·&nbsp; Launching soon</p>

    <div class="accent-line">
      <span></span>
      <p>We craft digital experiences that shine</p>
      <span></span>
    </div>
  </div>

  <script>
    // ── Particle field ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initParticles() {
      particles = Array.from({ length: 180 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1 + 0.5,
        speedY: -(Math.random() * 0.35 + 0.1),
        speedX: (Math.random() - 0.5) * 0.15,
        alpha: Math.random() * 0.55 + 0.15,
        flicker: Math.random() * Math.PI * 1.5,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 1200;
      for (const p of particles) {
        p.flicker += 0.018;
        const a = p.alpha * (0.75 + 0.25 * Math.sin(p.flicker));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${a})`;
        ctx.fill();
        p.y += p.speedY;
        p.x += p.speedX;
        if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      }

      // Soft radial haze
      const cx = W / 2, cy = H / 2;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.55);
      grad.addColorStop(0,   'rgba(201,168,76,0.04)');
      grad.addColorStop(0.5, 'rgba(201,168,76,0.015)');
      grad.addColorStop(1,   'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initParticles(); });
    resize(); initParticles(); draw();

    // ── Cursor glow follow ──
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });
  </script>
</body>
</html>
